<!DOCTYPE html>
<html lang="es">

<head>

<!-- Define la codificación de caracteres para que los acentos y símbolos se vean correctamente -->
<meta charset="UTF-8">

<!-- Título que aparecerá en la pestaña del navegador -->
<title>Plataforma de Perfil Profesional</title>

<!-- Conecta la página con el archivo de estilos CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Encabezado principal de la página -->
<header>

<!-- Título principal del sitio -->
<h1>Mi Perfil Profesional</h1>

<!-- Pequeña descripción de la plataforma -->
<p>Bienvenido a mi plataforma de proyectos.</p>

</header>

<!-- Sección donde se mostrará la información del perfil -->
<section id="perfil">

<!-- Título de la sección -->
<h2>Perfil</h2>

<!-- Texto provisional que después podremos reemplazar por información real -->
<p>Aquí se mostrará la información profesional del usuario.</p>

</section>

<!-- Sección destinada a mostrar los proyectos -->
<section id="proyectos">

<!-- Título de la sección -->
<h2>Proyectos</h2>

<!-- 
Formulario sencillo para registrar un nuevo proyecto.
El usuario podrá escribir el nombre y la descripción.
-->

<input type="text" id="nombreProyecto" placeholder="Nombre del proyecto">

<br><br>

<textarea id="descripcionProyecto" placeholder="Descripción del proyecto"></textarea>

<br><br>

<!-- Botón para guardar el proyecto -->
<button id="btnAgregar">Agregar proyecto</button>

<hr>

<!-- 
Aquí aparecerá la lista de proyectos que el usuario registre
-->
<div id="listaProyectos"></div>

</section>

<!-- Conexión con el archivo JavaScript que dará interactividad al sistema -->
<script src="script.js"></script>

</body>
</html>
